<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác Thực Email - Motor Việt-Nhật</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(26, 35, 126, 0.75) 0%, rgba(13, 71, 161, 0.85) 100%);
            padding: 2rem;
        }
        
        .auth-box {
            background: white;
            padding: 3rem;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }
        
        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .auth-logo h1 {
            color: #dc143c;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .auth-logo p {
            color: #666;
            font-size: 0.95rem;
        }
        
        .otp-info {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            border-left: 4px solid #2196f3;
        }
        
        .otp-info p {
            margin: 0;
            color: #1565c0;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        
        .otp-info strong {
            color: #0d47a1;
        }
        
        .auth-form .form-group {
            margin-bottom: 1.5rem;
        }
        
        .auth-form label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        
        .auth-form input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 8px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .auth-form input:focus {
            outline: none;
            border-color: #dc143c;
            box-shadow: 0 0 0 3px rgba(220, 20, 60, 0.1);
        }
        
        .btn-auth {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #dc143c 0%, #8b0000 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(220, 20, 60, 0.4);
        }
        
        .btn-resend {
            width: 100%;
            padding: 12px;
            background: white;
            color: #dc143c;
            border: 2px solid #dc143c;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-resend:hover {
            background: #dc143c;
            color: white;
        }
        
        .btn-resend:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .timer {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-logo">
                <h1>🔐 XÁC THỰC EMAIL</h1>
                <p>Bảo mật tài khoản của bạn</p>
            </div>
            
            <div class="otp-info">
                <p>
                    📧 Mã OTP đã được gửi đến email:<br>
                    <strong>{{ email }}</strong>
                </p>
                <p style="margin-top: 10px; font-size: 0.85rem;">
                    ⏱️ Mã có hiệu lực trong 10 phút
                </p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="otp">Nhập mã OTP (6 chữ số)</label>
                    <input type="text" id="otp" name="otp" maxlength="6" pattern="[0-9]{6}" required autofocus>
                </div>
                
                <button type="submit" class="btn-auth">✅ Xác Thực</button>
            </form>
            
            <button type="button" class="btn-resend" id="resendBtn" onclick="resendOTP()">
                🔄 Gửi lại mã OTP
            </button>
            
            <div class="timer" id="timer"></div>
        </div>
    </div>
    
    <script>
        let countdown = 60;
        let timer;
        
        function startTimer() {
            document.getElementById('resendBtn').disabled = true;
            timer = setInterval(function() {
                countdown--;
                document.getElementById('timer').textContent = `Có thể gửi lại sau ${countdown}s`;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    document.getElementById('resendBtn').disabled = false;
                    document.getElementById('timer').textContent = '';
                    countdown = 60;
                }
            }, 1000);
        }
        
        function resendOTP() {
            fetch('{{ url_for("auth.resend_otp") }}', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    alert('✅ ' + data.message);
                    startTimer();
                } else {
                    alert('❌ ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Đã xảy ra lỗi khi gửi lại mã OTP');
            });
        }
        
        // Auto-focus and auto-submit when 6 digits entered
        document.getElementById('otp').addEventListener('input', function(e) {
            if (e.target.value.length === 6) {
                e.target.form.submit();
            }
        });
        
        // Start timer on page load
        startTimer();
    </script>
</body>
</html>
