services:
  - type: web
    name: repair-shop
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --workers 2 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: repair-shop-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production

databases:
  - name: repair-shop-db
    databaseName: repair_shop_db
    user: repair_shop_user
    plan: free
